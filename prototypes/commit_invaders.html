<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Commit Invaders – SVG Generator</title>
<style>
  body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: ui-monospace, "SF Mono", Menlo, monospace; padding: 24px; }
  h1 { font-size: 13px; letter-spacing: .25em; color: #39d353; margin: 0 0 16px; font-weight: 600; }
  .card { background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card.light { background: #ffffff; border-color: #d0d7de; color: #1f2328; }
  .label { font-size: 10px; letter-spacing: .15em; opacity: .7; margin-bottom: 10px; text-transform: uppercase; }
  pre { background: #0d1117; color: #8b949e; padding: 12px; border-radius: 6px; overflow: auto; font-size: 10px; max-height: 220px; }
  button { background: #238636; color: white; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; font: inherit; margin-right: 8px; font-size: 12px; }
  button:hover { background: #2ea043; }
  .row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .meta { font-size: 11px; color: #8b949e; }
  svg { display: block; max-width: 100%; }
</style>
</head>
<body>
  <h1>▸ COMMIT INVADERS — GENERATOR</h1>

  <div class="row">
    <button id="regen">↻ Re-roll contributions</button>
    <button id="download">⬇ Download .svg</button>
    <span class="meta" id="size"></span>
  </div>

  <div class="card">
    <div class="label">Dark mode preview</div>
    <div id="dark-mount"></div>
  </div>

  <div class="card light">
    <div class="label">Light mode preview</div>
    <div id="light-mount"></div>
  </div>

  <div class="card">
    <div class="label">SVG source (first 3kb)</div>
    <pre id="src"></pre>
  </div>

<script>
'use strict';

const W = 860, H = 200;
const COLS = 53, ROWS = 7;
const CELL = 11, GAP = 2;
const GRID_X = 24, GRID_Y = 38;
const TOTAL = 60;
const T_INTRO = 2;
const T_OUTRO = 4;
const SHIP_Y = 178;
const SHIP_W = 22;

const DARK = {
  bg:'#0d1117', dim:'#30363d', star:'#1f6feb', accent:'#39d353',
  L:['#0e4429','#006d32','#26a641','#39d353'],
  laser:'#39d353', enemyLaser:'#f78166',
  ship:'#39d353', shipGlow:'#26a641',
  hud:'#39d353', hudDim:'#8b949e',
  scan:'rgba(57,211,83,0.05)', crash:'#f78166',
};
const LIGHT = {
  bg:'#ffffff', dim:'#d0d7de', star:'#0969da', accent:'#1a7f37',
  L:['#9be9a8','#40c463','#30a14e','#216e39'],
  laser:'#1a7f37', enemyLaser:'#cf222e',
  ship:'#1a7f37', shipGlow:'#2da44e',
  hud:'#1a7f37', hudDim:'#57606a',
  scan:'rgba(26,127,55,0.04)', crash:'#cf222e',
};

const cellX = c => GRID_X + c * (CELL + GAP);
const cellY = r => GRID_Y + r * (CELL + GAP);
const fmt = n => Math.round(n * 1000) / 1000;

function genContrib(seed) {
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const g = [];
  for (let r = 0; r < ROWS; r++) {
    g[r] = [];
    for (let c = 0; c < COLS; c++) {
      const wave = Math.sin(c / 5) * 0.4 + 0.6;
      const wk = (r >= 1 && r <= 5) ? 1 : 0.55;
      const p = rnd() * wave * wk;
      let v = 0;
      if (p < 0.22) v = 0;
      else if (p < 0.40) v = 1;
      else if (p < 0.58) v = 2;
      else if (p < 0.74) v = 3;
      else v = 4;
      if (c > 16 && c < 22 && r > 1 && r < 5) v = Math.max(v, 3);
      if (c > 36 && c < 42 && r > 2 && r < 6) v = Math.max(v, 4);
      g[r][c] = v;
    }
  }
  return g;
}

// 7x7 pixel sprites — classic Space Invaders look (squid-style)
const FRAME_A = [
  "0010100",
  "0011100",
  "0111110",
  "1110111",
  "1111111",
  "0101010",
  "1010101",
];
const FRAME_B = [
  "0010100",
  "1011101",
  "1111111",
  "1110111",
  "0111110",
  "1000001",
  "0100010",
];

// Convert sprite rows into a path string of horizontal runs
function spritePath(rows) {
  let d = '';
  for (let r = 0; r < rows.length; r++) {
    let runStart = -1;
    for (let c = 0; c <= rows[r].length; c++) {
      const filled = c < rows[r].length && rows[r][c] === '1';
      if (filled && runStart < 0) runStart = c;
      if (!filled && runStart >= 0) {
        d += `M${runStart} ${r}h${c - runStart}v1h-${c - runStart}z`;
        runStart = -1;
      }
    }
  }
  return d;
}

const PATH_A = spritePath(FRAME_A);
const PATH_B = spritePath(FRAME_B);
// 7x7 explosion sprite
const EXPLOSION = [
  "1010101",
  "0100010",
  "1011101",
  "0011100",
  "1011101",
  "0100010",
  "1010101",
];
const PATH_X = spritePath(EXPLOSION);

function buildSVG(T, grid) {
  const invs = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] > 0) invs.push({ r, c, hp: grid[r][c], lvl: grid[r][c] });

  invs.sort((a, b) => b.r - a.r || a.c - b.c);

  const totalShots = invs.reduce((s, i) => s + i.hp, 0);
  const battleStart = T_INTRO;
  const battleEnd = TOTAL - T_OUTRO;
  const interval = (battleEnd - battleStart) / totalShots;

  let shotIdx = 0;
  for (const inv of invs) {
    inv.hits = [];
    for (let h = 0; h < inv.hp; h++) {
      inv.hits.push(battleStart + shotIdx * interval);
      shotIdx++;
    }
    inv.dieAt = inv.hits[inv.hits.length - 1] + 0.04;
  }

  // Ship motion stops (sample subset to reduce keyframes)
  const stops = [{ t: 0, x: W / 2 - SHIP_W / 2 }];
  // For each kill, add a stop at the dieAt moment (final shot location).
  // For multi-hit invaders, also stop at first hit.
  for (const inv of invs) {
    const tx = cellX(inv.c) + CELL / 2 - SHIP_W / 2;
    const firstHit = inv.hits[0];
    stops.push({ t: Math.max(0.1, firstHit - 0.25), x: tx });
    stops.push({ t: inv.dieAt, x: tx });
  }
  stops.push({ t: battleEnd + 0.4, x: W / 2 - SHIP_W / 2 });
  stops.push({ t: TOTAL, x: W / 2 - SHIP_W / 2 });
  stops.sort((a, b) => a.t - b.t);
  const ss = [];
  for (const sp of stops) {
    if (ss.length && Math.abs(ss[ss.length - 1].t - sp.t) < 0.005) ss[ss.length - 1] = sp;
    else ss.push(sp);
  }

  const px = CELL / 7; // 1 sprite px size
  const sz = CELL;

  let out = '';
  out += `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">`;

  // Defs: shared symbols, gradients, filter, sprites
  out += `<defs>`;
  out += `<filter id="g" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  out += `<radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="60%" stop-color="${T.bg}" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.45"/></radialGradient>`;
  out += `<pattern id="scan" width="2" height="3" patternUnits="userSpaceOnUse"><rect width="2" height="1" fill="${T.scan}"/></pattern>`;

  // Per-level invader symbols, two frames
  // Each path is rendered at scale 'px' (so sprite is sz wide).
  // We compose 4 levels × 2 frames = 8 symbols.
  for (let lv = 0; lv < 4; lv++) {
    const color = T.L[lv];
    out += `<symbol id="iA${lv}" viewBox="0 0 7 7" overflow="visible"><path d="${PATH_A}" fill="${color}"/></symbol>`;
    out += `<symbol id="iB${lv}" viewBox="0 0 7 7" overflow="visible"><path d="${PATH_B}" fill="${color}"/></symbol>`;
  }
  // Explosion symbol
  out += `<symbol id="ex" viewBox="0 0 7 7" overflow="visible"><path d="${PATH_X}" fill="${T.crash}"/></symbol>`;
  // Ship symbol
  out += `<symbol id="ship" viewBox="0 0 22 12" overflow="visible">`;
  out += `<rect x="10" y="0" width="2" height="3" fill="${T.ship}"/>`;
  out += `<rect x="8" y="3" width="6" height="2" fill="${T.ship}"/>`;
  out += `<rect x="2" y="5" width="18" height="3" fill="${T.ship}"/>`;
  out += `<rect x="0" y="8" width="22" height="2" fill="${T.shipGlow}"/>`;
  out += `</symbol>`;

  out += `</defs>`;

  // Background
  out += `<rect width="${W}" height="${H}" fill="${T.bg}"/>`;

  // Stars
  let st = 99; const r2 = () => { st = (st * 9301 + 49297) % 233280; return st / 233280; };
  out += `<g opacity="0.55">`;
  for (let i = 0; i < 40; i++) {
    const x = r2() * W, y = r2() * H, rad = 0.4 + r2() * 0.7;
    const dur = 2 + r2() * 4, beg = -r2() * dur;
    out += `<circle cx="${fmt(x)}" cy="${fmt(y)}" r="${fmt(rad)}" fill="${T.star}"><animate attributeName="opacity" values="0.15;1;0.15" dur="${fmt(dur)}s" begin="${fmt(beg)}s" repeatCount="indefinite"/></circle>`;
  }
  out += `</g>`;

  // HUD
  out += hud(T);

  // Frame brackets
  const fy = 30, fh = H - 30 - 8;
  out += `<g stroke="${T.dim}" stroke-width="1" fill="none" opacity="0.6">`;
  out += `<path d="M 8 ${fy}v7M 8 ${fy}h7"/>`;
  out += `<path d="M ${W - 8} ${fy}v7M ${W - 8} ${fy}h-7"/>`;
  out += `<path d="M 8 ${fy + fh}v-7M 8 ${fy + fh}h7"/>`;
  out += `<path d="M ${W - 8} ${fy + fh}v-7M ${W - 8} ${fy + fh}h-7"/>`;
  out += `</g>`;

  // Fleet — march transform on outer wrapper
  out += `<g>`;
  // Two-frame bob via single animateTransform on a group containing both frames cycled by visibility
  // We do march with calcMode="discrete" — just two values alternating
  out += `<animateTransform attributeName="transform" type="translate" values="-3,0;3,0" keyTimes="0;0.5" dur="1.6s" repeatCount="indefinite" calcMode="discrete"/>`;

  // Two frame layers — each contains all invaders, alternated by opacity
  out += `<g><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.49;0.5;0.99;1" dur="0.9s" repeatCount="indefinite"/>`;
  for (const inv of invs) out += renderInvader(inv, 'A', px, sz);
  out += `</g>`;
  out += `<g><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.5;0.99;1" dur="0.9s" repeatCount="indefinite"/>`;
  for (const inv of invs) out += renderInvader(inv, 'B', px, sz);
  out += `</g>`;

  // Explosion overlays (one short pop per dying invader)
  for (const inv of invs) {
    const x = cellX(inv.c), y = cellY(inv.r);
    const dieN = inv.dieAt / TOTAL;
    out += `<use href="#ex" x="${x}" y="${fmt(y + px * 0.3)}" width="${sz}" height="${sz}" opacity="0">`;
    out += `<animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="0.35s" begin="${fmt(inv.dieAt)}s;${fmt(inv.dieAt + TOTAL)}s" fill="freeze"/>`;
    out += `</use>`;
  }

  out += `</g>`;

  // Enemy lasers
  out += enemyLasers(T, invs);

  // Player laser — single reusable element, repositioned per shot via discrete keys
  out += playerLaser(T, invs);

  // Ship
  out += ship(T, ss);

  // Victory banner
  out += victory(T, battleEnd + 0.5);

  // Overlays
  out += `<rect width="${W}" height="${H}" fill="url(#scan)" pointer-events="none"/>`;
  out += `<rect width="${W}" height="${H}" fill="url(#vig)" pointer-events="none"/>`;

  out += `<text x="${W - 10}" y="${H - 6}" text-anchor="end" font-size="7" fill="${T.hudDim}" letter-spacing="2" opacity="0.6">github-contrib-runner</text>`;

  out += `</svg>`;
  return out;
}

function hud(T) {
  let s = `<g font-size="9" letter-spacing="2">`;
  s += `<text x="20" y="16" fill="${T.hudDim}">SCORE</text>`;
  s += `<text x="20" y="27" fill="${T.hud}" font-weight="bold">00000`;
  // 12 ticker steps (was 24) — much fewer set tags
  const steps = 12;
  for (let i = 1; i <= steps; i++) {
    const t = T_INTRO + (i / steps) * (TOTAL - T_INTRO - T_OUTRO);
    const v = String(i * 290).padStart(5, '0');
    s += `<set attributeName="textContent" to="${v}" begin="${fmt(t)}s;${fmt(t + TOTAL)}s"/>`;
  }
  s += `<set attributeName="textContent" to="00000" begin="${fmt(TOTAL - 0.05)}s;${fmt(TOTAL * 2 - 0.05)}s"/>`;
  s += `</text>`;

  s += `<text x="${W / 2 - 36}" y="16" fill="${T.hudDim}">HI-SCORE</text>`;
  s += `<text x="${W / 2 - 36}" y="27" fill="${T.hud}" font-weight="bold">04829</text>`;

  s += `<text x="${W - 110}" y="16" fill="${T.hudDim}">WAVE</text>`;
  s += `<text x="${W - 110}" y="27" fill="${T.hud}" font-weight="bold">01</text>`;

  s += `<text x="${W - 30}" y="16" fill="${T.hudDim}">P1</text>`;
  s += `<text x="${W - 30}" y="27" fill="${T.accent}" font-weight="bold">●<animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/></text>`;

  s += `<text x="${W / 2}" y="13" text-anchor="middle" font-size="11" fill="${T.accent}" font-weight="bold" letter-spacing="6" filter="url(#g)">COMMIT INVADERS</text>`;
  s += `</g>`;
  return s;
}

function renderInvader(inv, frame, px, sz) {
  const x = cellX(inv.c), y = cellY(inv.r);
  const dieN = inv.dieAt / TOTAL;
  // <use> with opacity animation that hides at dieAt
  let s = `<use href="#i${frame}${inv.lvl - 1}" x="${x}" y="${fmt(y + px * 0.3)}" width="${sz}" height="${sz}">`;
  s += `<animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;${fmt(dieN)};${fmt(Math.min(0.999, dieN + 0.005))};${fmt((TOTAL - 0.05) / TOTAL)};1" dur="${TOTAL}s" repeatCount="indefinite"/>`;
  s += `</use>`;
  return s;
}

function ship(T, stops) {
  const valsX = stops.map(s => fmt(s.x)).join(';');
  const ks = stops.map(s => fmt(Math.min(1, Math.max(0, s.t / TOTAL)))).join(';');

  let s = `<g filter="url(#g)">`;
  s += `<g>`;
  s += `<use href="#ship" x="0" y="${SHIP_Y}" width="22" height="12">`;
  s += `<animate attributeName="x" values="${valsX}" keyTimes="${ks}" dur="${TOTAL}s" repeatCount="indefinite"/>`;
  s += `</use>`;
  s += `</g>`;
  s += `<animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;${fmt((TOTAL - T_OUTRO + 0.5) / TOTAL)};${fmt((TOTAL - T_OUTRO + 0.6) / TOTAL)};${fmt((TOTAL - 0.05) / TOTAL)};1" dur="${TOTAL}s" repeatCount="indefinite"/>`;
  s += `</g>`;
  return s;
}

// Single laser sprite that moves to each shot position.
// We render N small beam elements, but cap at one per kill (final hit only) to slash count.
function playerLaser(T, invs) {
  let out = '';
  const flight = 0.22;
  // For every hit, render a short-lived beam. To trim: only the final hit per invader gets a beam.
  // (Multi-hit invaders just see fewer visual lasers but still die animatedly.)
  // Actually a beam every shot is more satisfying — but caps total. Keep all.
  for (const inv of invs) {
    for (const ht of inv.hits) {
      const x = cellX(inv.c) + CELL / 2;
      const yEnd = cellY(inv.r) + CELL / 2;
      const beg = fmt(ht - flight);
      out += `<rect x="${fmt(x - 1)}" y="${SHIP_Y - 2}" width="2" height="6" fill="${T.laser}" opacity="0">`;
      out += `<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="${flight}s" begin="${beg}s;${fmt(beg + TOTAL)}s" fill="freeze"/>`;
      out += `<animate attributeName="y" values="${SHIP_Y - 2};${fmt(yEnd)}" dur="${flight}s" begin="${beg}s;${fmt(beg + TOTAL)}s" fill="freeze"/>`;
      out += `</rect>`;
    }
  }
  return out;
}

function enemyLasers(T, invs) {
  let out = '';
  let s = 13;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const N = 10;
  for (let i = 0; i < N; i++) {
    const inv = invs[Math.floor(rnd() * invs.length)];
    if (!inv) continue;
    const fireAt = T_INTRO + 1 + rnd() * (TOTAL - T_INTRO - T_OUTRO - 3);
    if (fireAt > inv.dieAt - 0.3) continue;
    const x = cellX(inv.c) + CELL / 2;
    const yS = cellY(inv.r) + CELL;
    const yE = SHIP_Y - 2;
    const dur = 0.8 + rnd() * 0.4;
    out += `<rect x="${fmt(x - 0.5)}" y="${fmt(yS)}" width="1.5" height="5" fill="${T.enemyLaser}" opacity="0">`;
    out += `<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="${fmt(dur)}s" begin="${fmt(fireAt)}s;${fmt(fireAt + TOTAL)}s" fill="freeze"/>`;
    out += `<animate attributeName="y" values="${fmt(yS)};${fmt(yE)}" dur="${fmt(dur)}s" begin="${fmt(fireAt)}s;${fmt(fireAt + TOTAL)}s" fill="freeze"/>`;
    out += `</rect>`;
  }
  return out;
}

function victory(T, tEnd) {
  const cx = W / 2, cy = H / 2;
  const k1 = fmt(tEnd / TOTAL);
  const k2 = fmt((tEnd + 0.3) / TOTAL);
  const k3 = fmt((TOTAL - 0.5) / TOTAL);
  const k4 = fmt((TOTAL - 0.1) / TOTAL);
  let s = `<g opacity="0">`;
  s += `<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;${k1};${k2};${k3};${k4};1" dur="${TOTAL}s" repeatCount="indefinite"/>`;
  s += `<rect x="${cx - 130}" y="${cy - 22}" width="260" height="44" fill="${T.bg}" stroke="${T.accent}" stroke-width="1.5"/>`;
  s += `<text x="${cx}" y="${cy - 3}" text-anchor="middle" font-size="14" font-weight="bold" fill="${T.accent}" letter-spacing="6" filter="url(#g)">STAGE CLEAR</text>`;
  s += `<text x="${cx}" y="${cy + 13}" text-anchor="middle" font-size="8" fill="${T.hudDim}" letter-spacing="3">PRESS START TO CONTINUE<animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite"/></text>`;
  s += `</g>`;
  return s;
}

function buildAdaptive(grid) {
  const tok = {
    bg:'var(--bg)', dim:'var(--dim)', star:'var(--star)', accent:'var(--accent)',
    L:['var(--l1)','var(--l2)','var(--l3)','var(--l4)'],
    laser:'var(--laser)', enemyLaser:'var(--elaser)',
    ship:'var(--ship)', shipGlow:'var(--shipg)',
    hud:'var(--hud)', hudDim:'var(--hudd)',
    scan:'var(--scan)', crash:'var(--crash)',
  };
  let svg = buildSVG(tok, grid);
  const v = (k, dark, light) => {
    return `--${k}:${light};`;
  };
  const style = `<style>
:root{--bg:${LIGHT.bg};--dim:${LIGHT.dim};--star:${LIGHT.star};--accent:${LIGHT.accent};--l1:${LIGHT.L[0]};--l2:${LIGHT.L[1]};--l3:${LIGHT.L[2]};--l4:${LIGHT.L[3]};--laser:${LIGHT.laser};--elaser:${LIGHT.enemyLaser};--ship:${LIGHT.ship};--shipg:${LIGHT.shipGlow};--hud:${LIGHT.hud};--hudd:${LIGHT.hudDim};--scan:${LIGHT.scan};--crash:${LIGHT.crash};}
@media (prefers-color-scheme: dark){:root{--bg:${DARK.bg};--dim:${DARK.dim};--star:${DARK.star};--accent:${DARK.accent};--l1:${DARK.L[0]};--l2:${DARK.L[1]};--l3:${DARK.L[2]};--l4:${DARK.L[3]};--laser:${DARK.laser};--elaser:${DARK.enemyLaser};--ship:${DARK.ship};--shipg:${DARK.shipGlow};--hud:${DARK.hud};--hudd:${DARK.hudDim};--scan:${DARK.scan};--crash:${DARK.crash};}}
</style>`;
  return svg.replace('<defs>', `<defs>${style}`);
}

function regen(seed) {
  const sd = seed != null ? seed : Math.floor(Math.random() * 10000);
  const grid = genContrib(sd);
  document.getElementById('dark-mount').innerHTML = buildSVG(DARK, grid);
  document.getElementById('light-mount').innerHTML = buildSVG(LIGHT, grid);
  const adaptive = buildAdaptive(grid);
  document.getElementById('src').textContent = adaptive.slice(0, 3000) + (adaptive.length > 3000 ? '\n…' : '');
  document.getElementById('size').textContent = (adaptive.length / 1024).toFixed(1) + ' KB · seed ' + sd;
  window.__svg = adaptive;
}
document.getElementById('regen').onclick = () => regen();
document.getElementById('download').onclick = () => {
  const blob = new Blob([window.__svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'commit-invaders.svg';
  a.click();
};
regen(42);
</script>
</body>
</html>
