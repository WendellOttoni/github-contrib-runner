name: GitHub Contrib Runner
description: Generate a custom animated SVG from a GitHub contribution calendar.
author: Wendell Ottoni

inputs:
  username:
    description: GitHub username to render.
    required: false
    default: ${{ github.repository_owner }}
  token:
    description: GitHub token used to read contribution data.
    required: false
    default: ""
  output:
    description: Output SVG path.
    required: false
    default: dist/contrib-runner.svg
  title:
    description: SVG title.
    required: false
    default: ""
  theme:
    description: Theme name. Supported values are fire, neon, ocean.
    required: false
    default: fire
  variant:
    description: Animation variant. Supported values are runner, spaceship, train, rocket, pulse, miner, scanner.
    required: false
    default: runner

runs:
  using: composite
  steps:
    - name: Generate contribution runner SVG
      shell: bash
      env:
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_THEME: ${{ inputs.theme }}
        INPUT_VARIANT: ${{ inputs.variant }}
        GITHUB_TOKEN: ${{ github.token }}
      run: node "$GITHUB_ACTION_PATH/src/cli.mjs"

branding:
  icon: activity
  color: orange
